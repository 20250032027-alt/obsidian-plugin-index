<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="orb1" cx="30%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#6d5ae0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#09090e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="80%" cy="70%" r="45%">
      <stop offset="0%" stop-color="#2dd4a0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#09090e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textgrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b8a9ff"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#09090e"/>

  <!-- Ambient orbs -->
  <ellipse cx="360" cy="252" rx="420" ry="280" fill="url(#orb1)" filter="url(#blur1)"/>
  <ellipse cx="960" cy="440" rx="380" ry="260" fill="url(#orb2)" filter="url(#blur1)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Logo mark -->
  <g transform="translate(80, 80)">
    <rect width="52" height="52" rx="14" fill="url(#textgrad)" opacity="0.9"/>
    <polygon points="26,8 46,18 46,34 26,44 6,34 6,18" fill="white" fill-opacity="0.2" stroke="white" stroke-opacity="0.9" stroke-width="1.5"/>
    <polygon points="26,14 38,20 38,32 26,38 14,32 14,20" fill="white" fill-opacity="0.35" stroke="white" stroke-opacity="0.6" stroke-width="1"/>
    <circle cx="26" cy="26" r="6" fill="white" fill-opacity="0.95"/>
  </g>

  <!-- Site name -->
  <text x="152" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="rgba(236,234,246,0.75)" letter-spacing="-0.5">ObsidianPluginIndex</text>

  <!-- Main headline -->
  <text x="80" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" letter-spacing="-3" fill="#eceaf6">Find plugins that</text>
  <text x="80" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" letter-spacing="-3" fill="url(#textgrad)">actually get used</text>

  <!-- Subtext -->
  <text x="80" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="rgba(236,234,246,0.5)" letter-spacing="-0.3">Community-ranked plugins, free sync wizard, plugin recommender, and guides.</text>

  <!-- Feature pills -->
  <g transform="translate(80, 490)">
    <!-- Plugin Index -->
    <rect width="170" height="44" rx="22" fill="rgba(139,120,255,0.12)" stroke="rgba(139,120,255,0.3)" stroke-width="1"/>
    <text x="85" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#b8a9ff" text-anchor="middle">Plugin Index</text>

    <!-- Recommender -->
    <rect x="182" width="178" height="44" rx="22" fill="rgba(45,212,160,0.08)" stroke="rgba(45,212,160,0.25)" stroke-width="1"/>
    <text x="271" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#2dd4a0" text-anchor="middle">Recommender</text>

    <!-- Sync Wizard -->
    <rect x="372" width="162" height="44" rx="22" fill="rgba(96,165,250,0.08)" stroke="rgba(96,165,250,0.25)" stroke-width="1"/>
    <text x="453" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#7dd3fc" text-anchor="middle">Sync Wizard</text>

    <!-- Guides -->
    <rect x="546" width="112" height="44" rx="22" fill="rgba(245,185,68,0.08)" stroke="rgba(245,185,68,0.25)" stroke-width="1"/>
    <text x="602" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#f5b944" text-anchor="middle">Guides</text>
  </g>

  <!-- No ads badge (top right) -->
  <g transform="translate(1040, 80)">
    <rect width="160" height="38" rx="19" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="80" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="rgba(236,234,246,0.45)" text-anchor="middle" letter-spacing="0.5">0 sponsored slots</text>
  </g>
</svg>
